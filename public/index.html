<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwinMind Live Suggestions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>TwinMind Live Copilot</h1>
          <p>Mic transcript, live suggestions, and chat in one session.</p>
        </div>
        <div class="topbar-actions">
          <button id="settingsToggle" class="btn btn-secondary">Settings</button>
          <button id="exportButton" class="btn btn-secondary">Export Session</button>
        </div>
      </header>

      <aside id="settingsPanel" class="settings-panel hidden">
        <h2>Settings</h2>
        <div class="settings-grid">
          <label>
            Groq API Key
            <input id="groqApiKey" type="password" placeholder="gsk_..." />
          </label>
          <label>
            Chat Model
            <input id="chatModel" type="text" value="openai/gpt-oss-120b" />
          </label>
          <label>
            Suggestion Context Window (entries)
            <input id="suggestionContextWindow" type="number" min="5" value="30" />
          </label>
          <label>
            Expanded Answer Context Window (entries)
            <input id="answerContextWindow" type="number" min="5" value="60" />
          </label>
          <label>
            Chat Context Window (entries)
            <input id="chatContextWindow" type="number" min="5" value="60" />
          </label>
          <label>
            Suggestion Temperature
            <input id="suggestionTemperature" type="number" min="0" max="1.5" step="0.1" value="0.4" />
          </label>
          <label>
            Chat Temperature
            <input id="chatTemperature" type="number" min="0" max="1.5" step="0.1" value="0.3" />
          </label>
        </div>
        <label>
          Live Suggestion Prompt
          <textarea id="liveSuggestionPrompt" rows="7"></textarea>
        </label>
        <label>
          Detailed Answer Prompt (on suggestion click)
          <textarea id="detailedAnswerPrompt" rows="6"></textarea>
        </label>
        <label>
          Chat Prompt (typed questions)
          <textarea id="chatPrompt" rows="6"></textarea>
        </label>
        <div class="settings-actions">
          <button id="saveSettings" class="btn">Save Settings</button>
        </div>
      </aside>

      <main class="grid">
        <section class="panel transcript-panel">
        <div class="panel-header">
          <h2>Transcript</h2>
          <div class="row-actions">
            <button id="micButton" class="btn">Start Mic</button>
          </div>
        </div>
        <div id="transcriptList" class="scroll-col"></div>
      </section>

      <section class="panel suggestions-panel">
        <div class="panel-header">
          <h2>Live Suggestions</h2>
          <div class="row-actions">
            <span id="suggestionStatus" class="subtle">Idle</span>
            <button id="refreshButton" class="btn btn-secondary">Refresh</button>
          </div>
        </div>
        <div id="suggestionBatches" class="scroll-col"></div>
      </section>

        <section class="panel chat-panel">
          <div class="panel-header">
            <h2>Chat</h2>
          </div>
          <div id="chatMessages" class="scroll-col chat-messages"></div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" placeholder="Ask a follow-up..." />
            <button class="btn" type="submit">Send</button>
          </form>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
